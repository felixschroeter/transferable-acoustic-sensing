model:
  name: mlp
  kwargs:
    latent_dims: 64
    domain_latent_dims: 4
    encoder_hidden_dims:
    - 1024
    - 128
    - 128
    decoder_hidden_dims:
    - 128
    - 128
    - 1024
    domain_classifier_hidden_dims:
    - 16
    - 8
    use_batch_norm: true
    use_GeLU: true
data:
  name: stft
  kwargs:
    apply_transform: stft
    window_size: 48000
    stride: 48000
training:
  batch_size: 64
  num_workers: 8
  persistent_workers: true
  prefetch_factor: 20
  pin_memory: true
  test_size: 0.2
  max_epochs: null
